<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Tell MakeSense about your project, website, product, or accessibility challenge."
    />
    <meta property="og:title" content="MakeSense | Contact" />
    <meta
      property="og:description"
      content="Send an enquiry to MakeSense about your next digital project."
    />
    <meta property="og:type" content="website" />
    <title>MakeSense | Contact</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f3f8f7'/%3E%3Cg fill='%23527a7a'%3E%3Crect x='27' y='10' width='10' height='44'/%3E%3Crect x='27' y='10' width='10' height='44' transform='rotate(60 32 32)'/%3E%3Crect x='27' y='10' width='10' height='44' transform='rotate(120 32 32)'/%3E%3C/g%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="contact">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="MakeSense home">
        <img src="assets/makesense-logo.svg" alt="MakeSense" />
      </a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="index.html" data-nav-page="home">Home</a>
        <a href="services.html" data-nav-page="services">Services</a>
        <a class="pill pill-dark" href="contact.html" data-nav-page="contact">Get in Touch <span aria-hidden="true">-></span></a>
      </nav>
    </header>

    <main>
      <section class="contact-page" aria-labelledby="contact-title">
        <div class="contact-heading">
          <a class="return-link" href="index.html">Return to home</a>
          <h1 id="contact-title">Tell us about your project.</h1>
        </div>

        <form class="contact-form" action="mailto:lets@makesense.co.nz" method="post" enctype="text/plain">
          <label class="field">
            <span>Your name *</span>
            <input name="name" type="text" placeholder="First name" required />
          </label>
          <label class="field">
            <span>Email *</span>
            <input name="email" type="email" placeholder="your@email.com" required />
          </label>
          <label class="field">
            <span>How can we help? *</span>
            <textarea
              name="message"
              placeholder="What are you building, what challenges are you facing, or what outcomes are you hoping to achieve?"
              required
            ></textarea>
          </label>
          <button class="pill pill-dark pill-large submit-button" type="submit">Send Enquiry</button>
        </form>
      </section>
    </main>

    <footer class="site-footer contact-footer">
      <p>© 2026 makesense new zealand</p>
      <p>ux · ui · accessibility · digital products &amp; websites</p>
      <p>proudly based in aotearoa new zealand</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
